<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TDCE Flow</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="contenedor">

    <header>

        <img src="assets/logo-banregio.png"
             alt="Banregio"
             id="logo">

        <h1>Flujo de Contratación TDCE</h1>

        <p>Sistema de Validación</p>

    </header>

    <main>

        <div id="pantallaInicio">

            <h2>Selecciona una facilidad</h2>

            <button id="btnFacilidad3">

                Facilidad 3 - Inversiones Banregio

            </button>

        </div>

        <div id="pantallaPregunta" style="display:none;">

            <div id="barra">

                <div id="progreso"></div>

            </div>

            <div id="codigo"></div>

            <h2 id="pregunta"></h2>

            <div id="nota"></div>

            <div class="botones">

                <button id="btnSi">SI</button>

                <button id="btnNo">NO</button>

            </div>

        </div>

        <div id="pantallaResultado" style="display:none;">

            <h2 id="tituloResultado"></h2>

            <p id="mensajeResultado"></p>

            <button id="reiniciar">

                Volver al inicio

            </button>

        </div>

    </main>

</div>

<script src="js/app.js"></script>

</body>

</html>
